{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Social Media</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

/* GENERAL */

body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f4f6fb;
}

/* NAVBAR */

.navbar{
position: fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#2d6cdf;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:1000;
}

/* Logo */
.logo{
font-size:22px;
font-weight:bold;
color:white;
}

/* Search Box */
.search-box{
flex:1;
display:flex;
justify-content:center;
}

/* Search Input */
.search-box input{
width:350px;
padding:8px 12px;
border-radius:20px;
border:none;
outline:none;
}

/* CONTAINER */

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
position: fixed;
top:60px;
left:0;
width:220px;
height:100%;
background:#ffffff;
padding-top:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
}

.sidebar a{
display:block;
padding:15px 25px;
text-decoration:none;
color:#333;
font-weight:500;
transition:0.3s;
}

.sidebar a:hover{
background:#f0f2ff;
color:#2d6cdf;
}

/* MAIN CONTENT */

.main-content{
margin-left:240px;
margin-top:80px;
padding:20px;
}

/* CARD STYLE */

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
🌐 SocialHub
</div>

<!-- SEARCH (CONNECTED TO FEED) -->
<div class="search-box">
<form action="/feed/" method="GET">
<input type="text" name="q" placeholder="🔍 Search users or posts...">
</form>
</div>

</div>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<a href="/feed/">🏠 Feed</a>
<a href="/myprofile/">👤 Profile</a>
<a href="/create/">➕ Create Post</a>
<a href="#">❤️ Likes</a>
<a href="/logout/">🚪 Logout</a>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

{% block content %}

{% endblock %}

</div>

</div>

</body>
</html>
