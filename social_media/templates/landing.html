<!DOCTYPE html>
<html>
<head>
<title>SocialHub</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(120deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.container{
max-width:600px;
}

h1{
font-size:50px;
margin-bottom:10px;
}

p{
font-size:20px;
margin-bottom:40px;
}

.buttons a{
text-decoration:none;
padding:12px 25px;
margin:10px;
border-radius:5px;
font-size:18px;
}

.login{
background:white;
color:#667eea;
}

.signup{
background:#ff7a18;
color:white;
}

.login:hover{
background:#f2f2f2;
}

.signup:hover{
background:#ff5e00;
}

</style>

</head>

<body>

<div class="container">

<h1>🌐 SocialHub</h1>

<p>Connect with friends. Share your moments. Discover amazing content.</p>

<div class="buttons">
<a href="/login/" class="login">Login</a>
<a href="/signup/" class="signup">Sign Up</a>
</div>

</div>

</body>
</html>
