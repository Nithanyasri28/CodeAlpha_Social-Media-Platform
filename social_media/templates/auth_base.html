<!DOCTYPE html>
<html>
<head>
<title>SocialHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#5a67d8;
}

</style>

</head>

<body>

<div class="card">

{% block content %}

{% endblock %}

</div>

</body>
</html>
